<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>发版路线图 · 公开查看</title>
<style>
  :root {
    --primary: #5B6CFF;
    --primary-soft: #EEF0FF;
    --primary-hover: #4858E8;
    --bg: #FFFFFF;
    --surface: #FFFFFF;
    --text: #1F2330;
    --text-2: #5A6172;
    --text-3: #9098AC;
    --border: #E6E8EF;
    --success: #2BB673;
    --warn: #E89B2A;
    --danger: #E25555;
    --info: #3D8EE0;
    /* 目标地图专用变量（对齐原型） */
    --tm-meet-full: #2DA878; --tm-meet-full-bg: #E7F4EE;
    --tm-meet-basic: #4488D0; --tm-meet-basic-bg: #E9F0FA;
    --tm-meet-none: #D0615C; --tm-meet-none-bg: #FBEAE9;
    --tm-meet-empty-bg: #F1F2F6; --tm-meet-empty-border: #C5CAD7;
    --tm-status-dev: #0D9488; --tm-status-sched: #D97706;
    --tm-status-wait: #94A3B8; --tm-status-nores: #BE185D;
    --tm-bg: #FFFFFF; --tm-bg-subtle: #FAFBFD; --tm-bg-muted: #F7F8FC; --tm-bg-inset: #F3F4F8;
    --tm-text: #1F2330; --tm-text-2: #5A6172; --tm-text-3: #9098AC;
    --tm-border: #E6E8EF; --tm-border-light: #EEF0F4;
    --tm-radius-md: 6px; --tm-radius-lg: 8px; --tm-radius-xl: 10px; --tm-radius-2xl: 12px;
    --tm-shadow-md: 0 4px 14px rgba(31,35,48,0.08); --tm-shadow-tip: 0 8px 28px rgba(31,35,48,0.14);
    --tm-tf: 0.12s ease; --tm-tb: 0.18s ease;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.6;
  }

  /* Header */
  .header {
    border-bottom: 1px solid var(--border);
    padding: 18px 32px;
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header .top { display: flex; align-items: center; justify-content: space-between; gap: 16px; }
  .header .title { font-size: 22px; font-weight: 600; }
  .header .subtitle { color: var(--text-2); font-size: 13px; margin-top: 4px; }
  .header .filter { display: flex; gap: 10px; align-items: center; margin-top: 14px; flex-wrap: wrap; }
  .header .filter select, .header .filter input {
    padding: 7px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px;
    background: #fff; color: var(--text);
  }
  .header .filter input { width: 220px; }

  /* Header actions */
  .header-actions { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 7px 14px; border-radius: 6px; border: 1px solid var(--border);
    background: #fff; color: var(--text); font-size: 13px;
    cursor: pointer; transition: all 0.15s; text-decoration: none;
  }
  .btn:hover { border-color: var(--primary); color: var(--primary); }
  .btn-primary { background: var(--primary); border-color: var(--primary); color: #fff; }
  .btn-primary:hover { background: var(--primary-hover); border-color: var(--primary-hover); color: #fff; }
  .btn-outline { border-color: var(--primary); color: var(--primary); background: #fff; }
  .btn-outline:hover { background: var(--primary-soft); }
  .user-badge { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-2); }
  .user-badge .avatar {
    width: 28px; height: 28px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center;
    color: #fff; font-size: 12px; font-weight: 600; background: linear-gradient(135deg, var(--primary), #8E9BFF);
  }

  /* Overview cards */
  .overview {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    padding: 24px 32px;
    background: linear-gradient(180deg, #FAFBFF, #FFFFFF);
  }
  .ov-card {
    background: #fff; border: 1px solid var(--border); border-radius: 12px; padding: 18px 20px;
    box-shadow: 0 2px 8px rgba(30,34,53,0.04);
  }
  .ov-card .label { color: var(--text-2); font-size: 12.5px; }
  .ov-card .value { font-size: 24px; font-weight: 600; margin-top: 4px; }
  .ov-card .desc { color: var(--text-3); font-size: 12px; margin-top: 6px; }
  .ov-card .tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
  .ov-card .tags .tag { font-size: 11px; padding: 2px 7px; border-radius: 4px; background: var(--primary-soft); color: var(--primary); }

  /* Layout */
  .page-wrapper { max-width: 960px; margin: 0 auto; }
  .container { display: flex; padding: 8px 32px 60px; gap: 28px; }
  .content { flex: 1; min-width: 0; }
  .toc {
    width: 180px; flex-shrink: 0; position: sticky; top: 160px; align-self: flex-start;
    border: 1px solid var(--border); border-radius: 10px; padding: 16px; background: #fff;
  }
  .toc-title { font-size: 13px; font-weight: 600; margin-bottom: 10px; }
  .toc-item { font-size: 12.5px; color: var(--text-2); padding: 6px 0; cursor: pointer; border-left: 2px solid transparent; padding-left: 8px; }
  .toc-item:hover { color: var(--primary); border-left-color: var(--primary); }
  .toc-item.active { color: var(--primary); border-left-color: var(--primary); font-weight: 500; }

  /* Date group */
  .group {
    margin-bottom: 32px;
    padding-bottom: 28px;
    border-bottom: 1px solid var(--border);
  }
  .group:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
  .group-head { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
  .group-head .date { font-size: 18px; font-weight: 600; }
  .group-head .count { color: var(--text-3); font-size: 13px; margin-right: auto; }
  .group-head .detail-btn { font-size: 12px; padding: 5px 12px; border: 1px solid var(--primary); color: var(--primary); border-radius: 6px; background: #fff; cursor: pointer; }
  .group-head .detail-btn:hover { background: var(--primary-soft); }

  /* Type section */
  .type-section { margin-bottom: 18px; }
  .type-section:last-child { margin-bottom: 0; }
  .type-title { display: flex; align-items: center; gap: 8px; font-weight: 600; font-size: 14px; margin-bottom: 8px; }
  .type-dot { width: 8px; height: 8px; border-radius: 50%; }
  .type-dot.add { background: var(--success); }
  .type-dot.opt { background: var(--info); }
  .type-dot.fix { background: var(--warn); }

  /* Item row */
  .item-row {
    padding: 7px 0;
    font-size: 13.5px; line-height: 1.55;
  }
  .item-business { font-weight: 500; color: var(--text); }
  .item-feature { color: var(--text); }
  .item-entry {
    display: inline; font-size: 12px; color: var(--primary);
    background: var(--primary-soft); padding: 2px 6px; border-radius: 4px;
    margin-left: 6px; white-space: nowrap;
  }
  .type-count { color: var(--text-3); font-size: 12px; font-weight: normal; margin-left: 4px; }

  /* Detail card (13 列完整字段) */
  .detail-card {
    border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px;
    background: #FAFBFD; margin-bottom: 12px;
  }
  .detail-head { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .detail-head .type-pill { display: inline-block; padding: 2px 10px; border-radius: 10px; font-size: 12px; color: #fff; }
  .type-pill.add { background: var(--success); }
  .type-pill.opt { background: var(--info); }
  .type-pill.fix { background: var(--warn); }
  .detail-product { font-size: 13px; color: var(--text-2); font-weight: 500; }
  .detail-feature { font-size: 13.5px; color: var(--text); line-height: 1.6; margin-bottom: 8px; }
  .detail-table { width: 100%; border-collapse: collapse; margin-top: 4px; }
  .detail-table th, .detail-table td { padding: 5px 8px; font-size: 12px; text-align: left; border-bottom: 1px dashed #E6E8EF; vertical-align: top; }
  .detail-table th { width: 80px; color: var(--text-3); font-weight: normal; background: transparent; }

  /* Modal */
  .modal {
    display: none; position: fixed; inset: 0; z-index: 200;
    background: rgba(31, 35, 48, 0.5); align-items: center; justify-content: center;
    padding: 20px;
  }
  .modal.show { display: flex; }
  .modal-content {
    background: #fff; border-radius: 12px; max-width: 760px; width: 100%; max-height: 85vh;
    display: flex; flex-direction: column; box-shadow: 0 20px 50px rgba(31,35,48,0.2);
  }
  .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 18px 20px; border-bottom: 1px solid var(--border); }
  .modal-header .title { font-size: 16px; font-weight: 600; }
  .modal-close { background: none; border: none; font-size: 20px; color: var(--text-3); cursor: pointer; }
  .modal-body { padding: 20px; overflow-y: auto; }
  .image-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
  .image-grid .img {
    aspect-ratio: 16/10; background: linear-gradient(135deg, #DDE3FF, #C8CFFF); border-radius: 8px;
  }
  .image-grid .img.wide { grid-column: 1 / -1; }

  /* Footer */
  .footer { text-align: center; color: var(--text-3); font-size: 12px; padding: 40px 32px; }

  /* Tabs */
  .tabs {
    display: inline-flex;
    gap: 4px;
    margin-top: 14px;
    padding: 4px;
    background: #F3F4F8;
    border-radius: 12px;
  }
  .tab {
    padding: 7px 18px;
    border: none;
    background: transparent;
    color: var(--text-2);
    font-size: 13.5px;
    cursor: pointer;
    border-radius: 9px;
    transition: background 0.18s ease, color 0.18s ease, box-shadow 0.18s ease;
  }
  .tab:hover { color: var(--text); background: rgba(255, 255, 255, 0.7); }
  .tab.active {
    background: #fff;
    color: var(--primary);
    font-weight: 600;
    box-shadow: 0 1px 3px rgba(31, 35, 48, 0.08);
  }
  .tab.locked { display: none; }

  /* ===== 目标地图（按原型重写） ===== */
  .tm-count { color: var(--tm-text-3); font-size: 12px; margin-left: auto; }

  /* 总览仪表盘：4 列 KPI 网格 */
  .tm-overview { display: grid; grid-template-columns: 0.85fr 1.5fr 1.15fr 1.3fr; gap: 0; background: var(--tm-bg-subtle); border: 1px solid var(--tm-border); border-radius: var(--tm-radius-2xl); margin-bottom: 24px; overflow: hidden; }
  .tm-kpi { padding: 18px 20px; border-right: 1px solid var(--tm-border-light); display: flex; flex-direction: column; }
  .tm-kpi:last-child { border-right: none; }
  .tm-kpi-label { font-size: 12px; font-weight: 500; color: var(--tm-text-3); margin-bottom: 10px; }
  .tm-kpi-num { font-size: 26px; font-weight: 700; line-height: 1.05; font-variant-numeric: tabular-nums; color: var(--tm-text); }
  .tm-kpi-num .pct { font-size: 14px; font-weight: 600; margin-left: 2px; }
  .tm-kpi-sub { font-size: 12px; color: var(--tm-text-2); margin-top: 6px; line-height: 1.6; }
  .tm-kpi-sub .seg { display: inline-block; margin-right: 8px; }
  .tm-kpi-sub .seg b { font-weight: 600; font-variant-numeric: tabular-nums; }
  .tm-stack { height: 10px; border-radius: 5px; overflow: hidden; background: var(--tm-border-light); display: flex; margin-top: auto; }
  .tm-stack span { height: 100%; transition: width var(--tm-tb); }
  .tm-stack span.full { background: var(--tm-meet-full); }
  .tm-stack span.basic { background: var(--tm-meet-basic); }
  .tm-stack span.none { background: var(--tm-meet-none); }
  .tm-legend { display: flex; gap: 14px; margin-top: 8px; font-size: 11.5px; color: var(--tm-text-2); flex-wrap: wrap; }
  .tm-legend i { display: inline-block; width: 9px; height: 9px; border-radius: 2px; margin-right: 4px; vertical-align: 0; }
  .tm-legend b { font-weight: 600; color: var(--tm-text); font-variant-numeric: tabular-nums; margin-left: 1px; }
  .tm-status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 16px; margin-top: 2px; }
  .tm-status-item { display: flex; align-items: center; gap: 6px; }
  .tm-status-item .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .tm-status-item .n { font-size: 17px; font-weight: 700; font-variant-numeric: tabular-nums; color: var(--tm-text); line-height: 1; }
  .tm-status-item .t { font-size: 11.5px; color: var(--tm-text-2); }
  .tm-biz-row { display: flex; align-items: center; gap: 8px; margin-top: 6px; font-size: 11.5px; }
  .tm-biz-row .bn { width: 56px; color: var(--tm-text-2); flex-shrink: 0; }
  .tm-biz-row .bar { flex: 1; height: 8px; border-radius: 4px; overflow: hidden; background: var(--tm-border-light); display: flex; }
  .tm-biz-row .br { width: 36px; text-align: right; color: var(--tm-text-3); font-variant-numeric: tabular-nums; flex-shrink: 0; }

  /* 视图切换 */
  .tm-switch { display: inline-flex; gap: 4px; padding: 4px; background: var(--tm-bg-inset); border-radius: 10px; margin-bottom: 16px; }
  .tm-switch button { padding: 6px 16px; border: none; background: transparent; color: var(--tm-text-2); font-size: 13px; cursor: pointer; border-radius: 7px; transition: all var(--tm-tb); font-family: inherit; }
  .tm-switch button:hover { color: var(--tm-text); background: rgba(255,255,255,0.7); }
  .tm-switch button.active { background: #fff; color: var(--primary); font-weight: 600; box-shadow: 0 1px 3px rgba(31,35,48,0.08); }

  /* 地图视图：场景 → 环节 → 色块墙 */
  .tm-map { margin-top: 4px; }
  .tm-map .tm-scene { margin-bottom: 24px; }
  .tm-scene-head { display: flex; align-items: baseline; gap: 10px; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--tm-border); }
  .tm-scene-head .name { font-size: 16px; font-weight: 600; color: var(--tm-text); }
  .tm-scene-head .name::before { content: ''; display: inline-block; width: 4px; height: 15px; border-radius: 2px; background: var(--primary); margin-right: 8px; vertical-align: -2px; }
  .tm-scene-head .cnt { color: var(--tm-text-3); font-size: 12.5px; }
  .tm-link-row { margin-bottom: 16px; }
  .tm-link-name { display: inline-flex; align-items: center; gap: 6px; font-size: 11.5px; font-weight: 600; letter-spacing: 0.3px; color: var(--tm-text-3); margin-bottom: 9px; padding-left: 2px; }
  .tm-link-name::before { content: ''; width: 5px; height: 5px; border-radius: 50%; background: var(--tm-text-3); flex-shrink: 0; }
  .tm-blocks { display: grid; grid-template-columns: repeat(auto-fill, minmax(172px, 1fr)); gap: 8px; }
  .tm-block { position: relative; min-height: 54px; padding: 8px 10px 8px 11px; border-radius: var(--tm-radius-lg); background: var(--tm-meet-empty-bg); border-left: 4px solid var(--tm-meet-empty-border); cursor: pointer; transition: transform var(--tm-tf), box-shadow var(--tm-tf); overflow: hidden; }
  .tm-block:hover { transform: translateY(-1px); box-shadow: var(--tm-shadow-md); z-index: 2; }
  .tm-block.mf { background: var(--tm-meet-full-bg); border-left-color: var(--tm-meet-full); }
  .tm-block.mb { background: var(--tm-meet-basic-bg); border-left-color: var(--tm-meet-basic); }
  .tm-block.mn { background: var(--tm-meet-none-bg); border-left-color: var(--tm-meet-none); }
  .tm-block.lh { border-left-width: 4px; opacity: 1; }
  .tm-block.lm { border-left-width: 3px; opacity: 1; }
  .tm-block.ll { border-left-width: 2px; opacity: 0.88; }
  .tm-block.ln { border-left-width: 1px; opacity: 0.70; }
  .tm-block-title { font-size: 12.5px; font-weight: 500; line-height: 1.4; color: var(--tm-text); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; padding-right: 14px; }
  .tm-dot { position: absolute; top: 7px; right: 7px; width: 7px; height: 7px; border-radius: 50%; }
  .tm-dot.d-dev { background: var(--tm-status-dev); }
  .tm-dot.d-sched { background: var(--tm-status-sched); }
  .tm-dot.d-wait { background: var(--tm-status-wait); }
  .tm-dot.d-nores { background: var(--tm-status-nores); }
  .tm-empty-scene { padding: 12px; color: var(--tm-text-3); font-size: 12.5px; }

  /* hover 气泡 */
  .tm-tip { position: fixed; z-index: 1000; max-width: 340px; padding: 12px 14px; background: #fff; border: 1px solid var(--tm-border); border-radius: var(--tm-radius-xl); box-shadow: var(--tm-shadow-tip); pointer-events: none; font-size: 12.5px; line-height: 1.6; }
  .tm-tip-title { font-size: 13.5px; font-weight: 600; margin-bottom: 6px; color: var(--tm-text); }
  .tm-tip-row { color: var(--tm-text-2); margin-bottom: 2px; }
  .tm-tip-row b { color: var(--tm-text-3); font-weight: 500; margin-right: 5px; }
  .tm-tip-sep { border-top: 1px dashed var(--tm-border); margin: 8px 0; padding-top: 8px; }
  .tm-tip-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; vertical-align: 0; }

  /* 表格视图 */
  .tm-table-wrap { border: 1px solid var(--tm-border); border-radius: var(--tm-radius-xl); overflow: hidden; max-height: 72vh; overflow-y: auto; }
  .tm-table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
  .tm-table th { position: sticky; top: 0; background: #FAFBFF; color: var(--tm-text-2); font-weight: 600; font-size: 12.5px; padding: 9px 12px; border-bottom: 1px solid var(--tm-border); text-align: left; z-index: 5; white-space: nowrap; }
  .tm-table td { padding: 9px 12px; border-bottom: 1px solid var(--tm-border-light); color: var(--tm-text); vertical-align: middle; }
  .tm-table td:nth-child(4), .tm-table td:nth-child(5), .tm-table td:nth-child(6), .tm-table td:nth-child(7) { white-space: nowrap; }
  .tm-table tr.scene-row td { background: var(--tm-bg-muted); font-weight: 600; color: var(--tm-text); font-size: 13px; border-top: 1px solid var(--tm-border); border-bottom: 1px solid var(--tm-border); box-shadow: inset 3px 0 0 var(--primary); }
  .tm-table tr.data-row:hover td { background: var(--tm-bg-subtle); }
  .tm-table tr.expand-row td { background: var(--tm-bg-subtle); border-bottom: 1px solid var(--tm-border); }
  .tm-table tr.expand-row .exp-content { padding: 4px 0; font-size: 12.5px; color: var(--tm-text-2); line-height: 1.7; }
  .tm-table tr.expand-row .exp-content b { color: var(--tm-text-3); font-weight: 600; margin-right: 5px; }
  .tm-table .td-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; vertical-align: 0; }
  .tm-table .lv-h { font-weight: 600; color: var(--tm-text); }
  .tm-table .lv-m { font-weight: 500; color: var(--tm-text); }
  .tm-table .lv-l { font-weight: 400; color: var(--tm-text-2); opacity: 0.85; }
  .tm-table .lv-n { font-weight: 400; color: var(--tm-text-3); opacity: 0.65; }
  .tm-table .exp-icon { display: inline-block; width: 0; height: 0; border-left: 5px solid var(--tm-text-3); border-top: 4px solid transparent; border-bottom: 4px solid transparent; transition: transform 0.15s ease; vertical-align: 1px; margin-right: 6px; cursor: pointer; }
  .tm-table .exp-icon.open { transform: rotate(90deg); }
  .tm-table .dash { color: var(--tm-text-3); }
  .tm-empty { padding: 40px; text-align: center; color: var(--tm-text-3); }

  /* 筛选栏：单行布局 */
  #filter-roadmap, #filter-targetmap {
    display: flex; gap: 10px; align-items: center; flex-wrap: nowrap;
    overflow-x: auto; padding-bottom: 2px;
  }
  #filter-roadmap .btn, #filter-targetmap .btn { flex-shrink: 0; padding: 7px 12px; }
  #filter-roadmap input, #filter-targetmap input {
    flex: 0 0 120px; min-width: 100px; padding: 7px 10px; border: 1px solid var(--border);
    border-radius: 6px; font-size: 13px; background: #fff; color: var(--text);
  }
  #filter-targetmap .tm-count { margin-left: auto; white-space: nowrap; }

  /* 多选下拉组件 */
  .multi-select { position: relative; z-index: 1; flex: 0 0 auto; min-width: 80px; max-width: 130px; }  .multi-select.open { z-index: 2; }
  .multi-trigger {
    padding: 5px 22px 5px 8px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px;
    background: #fff; color: var(--text); cursor: pointer; white-space: nowrap; overflow: hidden;
    text-overflow: ellipsis; position: relative; min-height: 32px; display: flex; align-items: center; gap: 4px;
  }
  .multi-trigger::after {
    content: ''; position: absolute; right: 8px; top: 50%; width: 0; height: 0;
    margin-top: -2px; border-left: 4px solid transparent; border-right: 4px solid transparent;
    border-top: 4px solid var(--text-3);
  }
  .multi-select.open .multi-trigger { border-color: var(--primary); }
  .multi-trigger .multi-placeholder { color: var(--text-3); font-size: 12.5px; }
  .multi-trigger .multi-tag {
    display: inline-flex; align-items: center; gap: 2px;
    padding: 1px 4px 1px 7px; border-radius: 10px; font-size: 11.5px;
    background: var(--primary-soft); color: var(--primary); white-space: nowrap; flex-shrink: 0;
  }
  .multi-trigger .multi-tag .remove {
    cursor: pointer; opacity: 0.6; font-size: 13px; line-height: 1; padding: 0 2px;
  }
  .multi-trigger .multi-tag .remove:hover { opacity: 1; background: rgba(91,108,255,0.15); border-radius: 50%; }
  .multi-trigger .multi-more {
    display: inline-flex; align-items: center; padding: 1px 6px; border-radius: 10px;
    font-size: 11.5px; background: #F0F0F4; color: var(--text-2); white-space: nowrap; flex-shrink: 0;
  }
  .multi-options {
    display: none; position: absolute; top: calc(100% + 4px); left: 0; min-width: 100%; width: max-content; max-height: 240px;
    overflow-y: auto; background: #fff; border: 1px solid var(--border); border-radius: 8px;
    box-shadow: 0 8px 20px rgba(31,35,48,0.12); z-index: 1000; padding: 6px 0;
  }
  .multi-options.fixed { position: fixed; }
  .multi-select.open .multi-options { display: block; }
  .multi-options label {
    display: flex; align-items: center; justify-content: space-between;
    padding: 6px 12px; font-size: 13px; color: var(--text);
    cursor: pointer; white-space: nowrap;
  }
  .multi-options label:hover { background: var(--primary-soft); }
  .multi-options input[type="checkbox"] { display: none; }
  .multi-options label.selected { color: var(--primary); background: var(--primary-soft); }
  .multi-options label.selected::after {
    content: '✓'; margin-left: 10px; color: var(--primary); font-size: 12px; font-weight: 600;
  }

  /* Responsive */
  @media (max-width: 900px) {
    .header { padding: 16px 20px; }
    .header .top { flex-wrap: wrap; }
    .header .filter { width: 100%; }
    .header .filter input { flex: 1; width: auto; }
    .header-actions { width: 100%; justify-content: flex-end; margin-top: 8px; }
    .overview { grid-template-columns: repeat(2, 1fr); padding: 16px 20px; }
    .container { flex-direction: column; padding: 8px 20px 40px; }
    .toc { width: 100%; position: static; display: flex; gap: 10px; padding: 12px; overflow-x: auto; }
    .toc-title { display: none; }
    .toc-item { border-left: none; border-bottom: 2px solid transparent; padding: 4px 6px; white-space: nowrap; }
    .toc-item:hover, .toc-item.active { border-left-color: transparent; border-bottom-color: var(--primary); }
    .image-grid { grid-template-columns: 1fr; }
  }
  @media (max-width: 560px) {
    .overview { grid-template-columns: 1fr; }
    .header .filter { flex-direction: column; align-items: stretch; }
    .header .filter select, .header .filter input { width: 100%; }
    .header .filter .multi-select { width: 100%; }
    .header .filter .multi-trigger { width: 100%; }
    #filter-roadmap, #filter-targetmap {
      flex-direction: row; align-items: center; flex-wrap: nowrap;
    }
    #filter-roadmap .multi-select, #filter-targetmap .multi-select { width: auto; min-width: 80px; max-width: 130px; }
    #filter-roadmap .multi-trigger, #filter-targetmap .multi-trigger { width: auto; }
    #filter-roadmap input, #filter-targetmap input { flex: 0 0 100px; min-width: 80px; }
    .item-row { flex-direction: column; gap: 6px; }
    .item-entry { align-self: flex-start; margin-top: 0; }
  }
</style>
</head>
<body>

<div class="page-wrapper">

<div class="header">
  <div class="top">
    <div>
      <div class="title">发版路线图</div>
    </div>
    <div class="header-actions" id="header-actions">
      <button class="btn btn-primary" onclick="openLogin()">登录</button>
    </div>
  </div>
  <div class="tabs">
    <div class="tab active" id="tab-roadmap" onclick="switchTab('roadmap')">发版路线图</div>
    <div class="tab locked" id="tab-targetmap" onclick="switchTab('targetmap')">目标地图</div>
  </div>

  <div class="filter" id="filter-roadmap">
    <div class="multi-select" id="ms-product">
      <div class="multi-trigger" onclick="toggleMulti('ms-product')"><span class="multi-placeholder">全部产品线</span></div>
      <div class="multi-options">
        <label><input type="checkbox" value="闻道作业" onchange="onMultiChange('ms-product')">闻道作业</label>
        <label><input type="checkbox" value="直播教学" onchange="onMultiChange('ms-product')">直播教学</label>
        <label><input type="checkbox" value="开放学校" onchange="onMultiChange('ms-product')">开放学校</label>
      </div>
    </div>
    <div class="multi-select" id="ms-type">
      <div class="multi-trigger" onclick="toggleMulti('ms-type')"><span class="multi-placeholder">全部类型</span></div>
      <div class="multi-options">
        <label><input type="checkbox" value="新增" onchange="onMultiChange('ms-type')">新增</label>
        <label><input type="checkbox" value="优化" onchange="onMultiChange('ms-type')">优化</label>
        <label><input type="checkbox" value="修复" onchange="onMultiChange('ms-type')">修复</label>
      </div>
    </div>
    <div class="multi-select" id="ms-date">
      <div class="multi-trigger" onclick="toggleMulti('ms-date')"><span class="multi-placeholder">全部日期</span></div>
      <div class="multi-options">
        <label><input type="checkbox" value="最近 7 天" onchange="onMultiChange('ms-date')">最近 7 天</label>
        <label><input type="checkbox" value="最近 30 天" onchange="onMultiChange('ms-date')">最近 30 天</label>
        <label><input type="checkbox" value="2026 年 7 月" onchange="onMultiChange('ms-date')">2026 年 7 月</label>
      </div>
    </div>
    <input type="text" id="filter-keyword" placeholder="搜索功能点 / 功能入口" />
    <button class="btn btn-primary" onclick="applyFilter()">确定</button>
    <button class="btn" onclick="clearFilter()">清除筛选</button>
  </div>

  <div class="filter" id="filter-targetmap" style="display:none">
    <div class="multi-select" id="ms-biz">
      <div class="multi-trigger" onclick="toggleMulti('ms-biz')"><span class="multi-placeholder">全部业务</span></div>
      <div class="multi-options">
        <label><input type="checkbox" value="直播业务" onchange="onMultiChange('ms-biz')">直播业务</label>
        <label><input type="checkbox" value="录播业务" onchange="onMultiChange('ms-biz')">录播业务</label>
        <label><input type="checkbox" value="独立项目" onchange="onMultiChange('ms-biz')">独立项目</label>
      </div>
    </div>
    <div class="multi-select" id="ms-level">
      <div class="multi-trigger" onclick="toggleMulti('ms-level')"><span class="multi-placeholder">全部等级</span></div>
      <div class="multi-options">
        <label><input type="checkbox" value="高" onchange="onMultiChange('ms-level')">高</label>
        <label><input type="checkbox" value="中" onchange="onMultiChange('ms-level')">中</label>
        <label><input type="checkbox" value="低" onchange="onMultiChange('ms-level')">低</label>
        <label><input type="checkbox" value="非必须" onchange="onMultiChange('ms-level')">非必须</label>
      </div>
    </div>
    <div class="multi-select" id="ms-meet">
      <div class="multi-trigger" onclick="toggleMulti('ms-meet')"><span class="multi-placeholder">全部满足度</span></div>
      <div class="multi-options">
        <label><input type="checkbox" value="完全满足" onchange="onMultiChange('ms-meet')">完全满足</label>
        <label><input type="checkbox" value="基本满足" onchange="onMultiChange('ms-meet')">基本满足</label>
        <label><input type="checkbox" value="完全不满足" onchange="onMultiChange('ms-meet')">完全不满足</label>
      </div>
    </div>
    <div class="multi-select" id="ms-state">
      <div class="multi-trigger" onclick="toggleMulti('ms-state')"><span class="multi-placeholder">全部状态</span></div>
      <div class="multi-options">
        <label><input type="checkbox" value="待排期" onchange="onMultiChange('ms-state')">待排期</label>
        <label><input type="checkbox" value="已排期" onchange="onMultiChange('ms-state')">已排期</label>
        <label><input type="checkbox" value="开发中" onchange="onMultiChange('ms-state')">开发中</label>
        <label><input type="checkbox" value="暂不响应" onchange="onMultiChange('ms-state')">暂不响应</label>
      </div>
    </div>
    <input type="text" id="tmf-keyword" placeholder="关键字" />
    <button class="btn btn-primary" onclick="applyTargetFilter()">确定</button>
    <button class="btn" onclick="clearTargetFilter()">清空筛选</button>
    <span class="tm-count" id="tm-count"></span>
  </div>
</div>

<div class="overview" id="overview-cards">
  <div class="ov-card">
    <div class="label">最新发版</div>
    <div class="value" id="ov-latest">—</div>
    <div class="desc">已发布内容最新日期</div>
  </div>
  <div class="ov-card">
    <div class="label">近 30 天发版</div>
    <div class="value" id="ov-30count">0</div>
    <div class="desc">已通知用户的发版项数</div>
  </div>
  <div class="ov-card">
    <div class="label">产品线分布</div>
    <div class="tags" id="ov-pl-tags"></div>
  </div>
  <div class="ov-card">
    <div class="label">下次发版预告</div>
    <div class="value" id="ov-next">—</div>
    <div class="desc" id="ov-next-desc"></div>
  </div>
</div>

<div class="container">
  <div class="content">
    <div id="view-roadmap">
      <!-- 发版分组由 loadPublic() 动态渲染 -->
      <div class="footer">仅展示已发布内容 · 数据由后端接口实时返回</div>
    </div>

    <div id="view-targetmap" style="display:none">
      <div id="tm-overview"></div>
      <div class="tm-switch">
        <button class="active" id="vbtn-map" onclick="switchTmView('map')">地图视图</button>
        <button id="vbtn-table" onclick="switchTmView('table')">表格视图</button>
      </div>
      <div id="tm-map-view" class="tm-map"></div>
      <div id="tm-table-view" style="display:none"></div>
      <p style="color:var(--text-3);font-size:12px;margin-top:14px">数据来源：闻道作业商用目标地图（全量进度管理）。本视图仅登录用户可见，不含单校交付明细。</p>
    </div>
  </div>

  <div class="toc" id="toc-roadmap">
    <div class="toc-title">目录</div>
    <!-- 目录项由 loadPublic() 动态生成 -->
  </div>

  <div class="toc" id="toc-targetmap" style="display:none">
    <div class="toc-title">场景目录</div>
    <!-- 场景目录由 renderTargetMap() 动态生成 -->
  </div>
</div>

</div>

<!-- Detail Modal -->
<div class="modal" id="detail-modal" onclick="closeModal(event)">
  <div class="modal-content" onclick="event.stopPropagation()">
    <div class="modal-header">
      <div class="title" id="detail-title">发版详情</div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="image-grid" id="detail-images">
        <div class="img"></div>
        <div class="img"></div>
        <div class="img wide"></div>
      </div>
      <p class="text-muted" style="color:var(--text-2);font-size:12.5px;margin-top:14px">以上为本次发版的功能截图与长图，可右键保存或滚动查看。</p>
    </div>
  </div>
</div>

<!-- Login Modal -->
<div class="modal" id="login-modal" onclick="closeLogin(event)">
  <div class="modal-content" style="max-width:360px" onclick="event.stopPropagation()">
    <div class="modal-header">
      <div class="title">模拟登录</div>
      <button class="modal-close" onclick="closeLogin()">×</button>
    </div>
    <div class="modal-body">
      <p style="color:var(--text-2);font-size:13px;margin:0 0 12px">选择角色以演示登录状态：</p>
      <div style="display:flex;flex-direction:column;gap:8px">
        <button class="btn btn-outline" onclick="login('guest')">普通用户登录</button>
        <button class="btn btn-outline" onclick="login('ops')">运营登录</button>
        <button class="btn btn-outline" onclick="login('admin')">管理员登录</button>
      </div>
    </div>
  </div>
</div>

<script>
  // 通用 API 调用
  const API = '';
  async function apiGet(path) {
    const r = await fetch(API + path);
    const j = await r.json();
    if (j.code !== 'OK') throw new Error(j.message || '请求失败');
    return j.data;
  }
  async function apiPost(path, body) {
    const r = await fetch(API + path, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body || {}) });
    const j = await r.json();
    if (j.code !== 'OK') throw new Error(j.message || '请求失败');
    return j.data;
  }

  let currentUser = null;
  const AUTH_KEY = 'release_roadmap_user';
  try {
    const raw = localStorage.getItem(AUTH_KEY);
    if (raw) currentUser = JSON.parse(raw);
  } catch (e) {}

  function saveUserToStorage(user) {
    try {
      if (user) localStorage.setItem(AUTH_KEY, JSON.stringify(user));
      else localStorage.removeItem(AUTH_KEY);
    } catch (e) {}
  }
  let releasesByDate = {};
  let rawData = null;
  let targetMapData = [];

  function escapeHtml(s) { return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
  function weekday(date) { return ['周日','周一','周二','周三','周四','周五','周六'][new Date(date).getDay()]; }
  function typeClass(type) { return type === '新增' ? 'add' : type === '优化' ? 'opt' : 'fix'; }
  function parseDate(d) { return new Date(d + 'T00:00:00'); }

  function jumpTo(id, targetEl) {
    const el = document.getElementById(id);
    if (!el) return;
    // 减去 sticky header 高度，避免标题被顶部遮挡
    const header = document.querySelector('.header');
    const offset = (header ? header.offsetHeight : 0) + 8;
    const top = el.getBoundingClientRect().top + window.scrollY - offset;
    window.scrollTo({ top: top, behavior: 'smooth' });
    document.querySelectorAll('.toc-item').forEach(i => i.classList.remove('active'));
    if (targetEl) targetEl.classList.add('active');
  }

  async function openDetail(date) {
    try {
      const data = await apiGet('/api/public/releases/' + date);
      releasesByDate[date] = data.items;
      document.getElementById('detail-title').textContent = date + ' · 发版详情';
      const grid = document.getElementById('detail-images');
      if (data.items.length === 0) {
        grid.innerHTML = '<div style="grid-column:1/-1;color:var(--text-3);padding:20px;text-align:center">该日期无已发布内容</div>';
      } else {
        // 按发布清单 13 列结构完整展示
        grid.style.display = 'block';
        grid.style.gridTemplateColumns = '1fr';
        grid.innerHTML = data.items.map(it => {
          const extraRows = [];
          const fields = [
            ['平台/范围', it.platformScope],
            ['涉及端', it.scope],
            ['是否重点', it.isHighlight === '是' ? '✓ 是' : '—'],
            ['面向用户', it.targetUser],
            ['功能入口', it.featureEntry],
            ['特殊说明', it.specialNotes],
            ['限制条件', it.limitNotes],
            ['运营验证结论', it.notes],
            ['提供材料', it.provideMaterial],
            ['备注补充', it.remarks],
          ];
          fields.forEach(([k, v]) => { if (v && v !== '—') extraRows.push('<tr><th>' + k + '</th><td>' + escapeHtml(v) + '</td></tr>'); });
          return '<div class="detail-card">' +
            '<div class="detail-head">' +
              '<span class="type-pill ' + typeClass(it.releaseType) + '">' + escapeHtml(it.releaseType) + '</span>' +
              '<span class="detail-product">' + escapeHtml(it.productLine || '—') + ' · ' + escapeHtml(it.appPlatform) + '</span>' +
            '</div>' +
            '<div class="detail-feature">' + escapeHtml(it.featurePoint) + '</div>' +
            (extraRows.length ? '<table class="detail-table">' + extraRows.join('') + '</table>' : '') +
          '</div>';
        }).join('');
      }
    } catch (e) {
      alert('加载详情失败：' + e.message);
      return;
    }
    document.getElementById('detail-modal').classList.add('show');
  }

  function closeModal(e) {
    if (!e || e.target.id === 'detail-modal') {
      document.getElementById('detail-modal').classList.remove('show');
    }
  }

  function openLogin() {
    document.getElementById('login-modal').classList.add('show');
  }

  function closeLogin(e) {
    if (!e || e.target.id === 'login-modal') {
      document.getElementById('login-modal').classList.remove('show');
    }
  }

  async function login(role) {
    if (role === 'guest') {
      currentUser = { role: 'guest', realname: '游客' };
    } else {
      try {
        const data = await apiPost('/api/auth/login', { role, username: role === 'admin' ? 'admin' : 'wangrong' });
        currentUser = { role, realname: data.realname, username: data.username };
      } catch (e) {
        alert('登录失败：' + e.message);
        return;
      }
    }
    saveUserToStorage(currentUser);
    closeLogin();
    renderHeader();
    loadPublic();
    if (currentUser) loadTargetMap();
  }

  function logout() {
    currentUser = null;
    saveUserToStorage(null);
    targetMapData = [];
    renderHeader();
    loadPublic();
    if (!currentUser) {
      // 退出登录时强制回到路线图视图
      switchTab('roadmap');
    }
  }

  function renderHeader() {
    const box = document.getElementById('header-actions');
    const tabTargetmap = document.getElementById('tab-targetmap');
    if (!currentUser) {
      box.innerHTML = '<button class="btn btn-primary" onclick="openLogin()">登录</button>';
      tabTargetmap.classList.add('locked');
      return;
    }

    tabTargetmap.classList.remove('locked');

    let html = '<div class="user-badge"><span class="avatar">' + (currentUser.role === 'admin' ? '管' : currentUser.role === 'ops' ? '运' : '游') + '</span><span>' + roleName(currentUser.role) + '</span></div>';

    if (currentUser.role === 'ops' || currentUser.role === 'admin') {
      html += '<a class="btn btn-primary" href="' + (currentUser.role === 'admin' ? 'admin.html' : 'ops.html') + '">进入后台</a>';
    }

    html += '<button class="btn" onclick="logout()">退出</button>';
    box.innerHTML = html;
  }

  function roleName(role) {
    return role === 'admin' ? '管理员' : role === 'ops' ? '运营' : '游客';
  }

  // ---- 加载公开发版数据 ----
  function renderOverview(ov) {
    document.getElementById('ov-latest').textContent = ov.latestRelease || '—';
    document.getElementById('ov-30count').textContent = ov.last30Count;
    const tagsEl = document.getElementById('ov-pl-tags');
    tagsEl.innerHTML = Object.entries(ov.productLineCount).map(([k, v]) => '<span class="tag">' + k + ' ' + v + '</span>').join('') || '<span class="tag">暂无</span>';
    document.getElementById('ov-next').textContent = ov.nextReleaseDate || '—';
    document.getElementById('ov-next-desc').textContent = ov.nextReleaseTheme || '';
  }

  function renderGroups(groups) {
    const content = document.getElementById('view-roadmap');
    const toc = document.getElementById('toc-roadmap');
    // 移除旧 group + 目录
    content.querySelectorAll('.group').forEach(g => g.remove());
    toc.querySelectorAll('.toc-item').forEach(t => t.remove());
    if (groups.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'group';
      empty.innerHTML = '<div class="empty" style="padding:40px;text-align:center;color:var(--text-3)">暂无已发布内容</div>';
      content.appendChild(empty);
      return;
    }
    groups.forEach((g, idx) => {
      const wrap = document.createElement('div');
      wrap.className = 'group';
      wrap.id = 'g-' + g.date;
      // 按发版类型分组（按 PRD：新增 → 优化 → 修复）
      const TYPE_ORDER = ['新增', '优化', '修复'];
      const byType = {};
      g.items.forEach(it => {
        const t = TYPE_ORDER.includes(it.releaseType) ? it.releaseType : '修复';
        (byType[t] = byType[t] || []).push(it);
      });
      const sections = TYPE_ORDER.map(t => {
        const list = byType[t] || [];
        if (!list.length) return '';
        return '<div class="type-section"><div class="type-title"><span class="type-dot ' + typeClass(t) + '"></span>' + t + ' <span class="type-count">· ' + list.length + ' 项</span></div>' +
          list.map(it => {
            // 精简展示：所属业务：功能点 「功能入口」
            return '<div class="item-row">' +
              '<span class="item-business">' + escapeHtml(it.productLine || it.appPlatform || '—') + '</span>：' +
              '<span class="item-feature">' + escapeHtml(it.featurePoint) + '</span>' +
              '<span class="item-entry">「' + escapeHtml(it.featureEntry || '—') + '」</span>' +
            '</div>';
          }).join('') + '</div>';
      }).join('');
      const detailBtn = currentUser && currentUser.role !== 'guest'
        ? '<button class="detail-btn" onclick="openDetail(\'' + g.date + '\')">查看详情</button>'
        : '';
      wrap.innerHTML = '<div class="group-head"><div class="date">' + g.date + ' · ' + weekday(g.date) + '</div><div class="count">共 ' + g.items.length + ' 项</div>' + detailBtn + '</div>' + sections;
      // 插入到 view-roadmap 的 footer 之前
      const footer = content.querySelector('.footer');
      if (footer) content.insertBefore(wrap, footer);
      else content.appendChild(wrap);
      // TOC
      const ti = document.createElement('div');
      ti.className = 'toc-item' + (idx === 0 ? ' active' : '');
      ti.textContent = g.date;
      ti.onclick = function(e) { jumpTo('g-' + g.date, e.currentTarget); };
      toc.appendChild(ti);
    });
  }

  // ---- 筛选逻辑 ----
  function getFilterValues() {
    return {
      productLine: getMultiValues('ms-product'),
      type: getMultiValues('ms-type'),
      date: getMultiValues('ms-date'),
      keyword: document.getElementById('filter-keyword').value.trim()
    };
  }

  function filterGroups(groups, fv) {
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    const d7 = new Date(today); d7.setDate(d7.getDate() - 7);
    const d30 = new Date(today); d30.setDate(d30.getDate() - 30);

    return groups.map(g => {
      if (fv.date.length) {
        const gd = parseDate(g.date);
        const keep = fv.date.some(function (d) {
          if (d === '最近 7 天') return gd >= d7;
          if (d === '最近 30 天') return gd >= d30;
          if (d === '2026 年 7 月') return (g.date >= '2026-07-01' && g.date <= '2026-07-31');
          return false;
        });
        if (!keep) return null;
      }
      const items = g.items.filter(it => {
        if (fv.productLine.length && !fv.productLine.includes(it.productLine || '')) return false;
        if (fv.type.length && !fv.type.includes(it.releaseType || '')) return false;
        if (fv.keyword) {
          const hay = ((it.featurePoint || '') + ' ' + (it.featureEntry || '')).toLowerCase();
          if (!hay.includes(fv.keyword.toLowerCase())) return false;
        }
        return true;
      });
      if (items.length === 0) return null;
      return { ...g, items };
    }).filter(Boolean);
  }

  function applyFilter() {
    if (!rawData) return;
    renderGroups(filterGroups(rawData.groups, getFilterValues()));
  }

  function clearFilter() {
    ['ms-product', 'ms-type', 'ms-date'].forEach(function (id) {
      const el = document.getElementById(id);
      el.querySelectorAll('.multi-options input').forEach(function (i) { i.checked = false; });
      setMultiTriggerText(id);
      updateMultiOptionStyles(id);
    });
    document.getElementById('filter-keyword').value = '';
    if (rawData) renderGroups(rawData.groups);
  }

  async function loadPublic() {
    try {
      const data = await apiGet('/api/public/releases');
      rawData = data;
      renderOverview(data.overview);
      renderGroups(data.groups);
    } catch (e) {
      console.error('加载发版列表失败', e);
    }
  }
  renderHeader();
  loadPublic();
  if (currentUser) loadTargetMap();

  // ---- 目标地图 ----
  async function loadTargetMap() {
    if (!currentUser) return;
    try {
      const data = await apiGet('/api/public/target-map');
      targetMapData = data.items || [];
      // 首次加载后，若当前在目标地图视图则渲染
      const tmView = document.getElementById('view-targetmap');
      if (tmView && tmView.style.display !== 'none') applyTargetFilter();
    } catch (e) {
      console.error('加载目标地图失败', e);
      targetMapData = [];
    }
  }

  function switchTab(which) {
    const road = which === 'roadmap';
    document.getElementById('view-roadmap').style.display = road ? '' : 'none';
    document.getElementById('view-targetmap').style.display = road ? 'none' : '';
    document.getElementById('toc-roadmap').style.display = road ? '' : 'none';
    document.getElementById('toc-targetmap').style.display = road ? 'none' : '';
    document.getElementById('filter-roadmap').style.display = road ? '' : 'none';
    document.getElementById('filter-targetmap').style.display = road ? 'none' : '';
    document.getElementById('overview-cards').style.display = road ? '' : 'none';
    document.getElementById('tab-roadmap').classList.toggle('active', road);
    document.getElementById('tab-targetmap').classList.toggle('active', !road);
    if (!road) {
      // 进入目标地图：未登录则强制跳回
      if (!currentUser) {
        alert('请先登录后查看目标地图');
        switchTab('roadmap');
        return;
      }
      // 数据未加载时按需拉取
      if (!targetMapData.length) loadTargetMap();
      else applyTargetFilter();
    }
  }

  // ---- 目标地图多选组件 ----
  function resetMultiOptions(ms) {
    const opts = ms.querySelector('.multi-options');
    if (opts) {
      opts.classList.remove('fixed');
      opts.style.top = '';
      opts.style.left = '';
      opts.style.width = '';
      opts.style.minWidth = '';
    }
  }
  function updateMultiOptionStyles(id) {
    const el = document.getElementById(id);
    el.querySelectorAll('.multi-options label').forEach(function (label) {
      const cb = label.querySelector('input[type="checkbox"]');
      if (cb && cb.checked) label.classList.add('selected');
      else label.classList.remove('selected');
    });
  }
  function toggleMulti(id) {
    const el = document.getElementById(id);
    const wasOpen = el.classList.contains('open');
    // 关闭全部并清除定位样式
    document.querySelectorAll('.multi-select').forEach(function (ms) {
      ms.classList.remove('open');
      resetMultiOptions(ms);
    });
    if (!wasOpen) {
      el.classList.add('open');
      const trigger = el.querySelector('.multi-trigger');
      const opts = el.querySelector('.multi-options');
      if (trigger && opts) {
        const rect = trigger.getBoundingClientRect();
        opts.classList.add('fixed');
        opts.style.top = (rect.bottom + 4) + 'px';
        opts.style.left = rect.left + 'px';
        opts.style.minWidth = rect.width + 'px';
        updateMultiOptionStyles(id);
      }
    }
  }
  function getMultiValues(id) {
    const el = document.getElementById(id);
    return Array.from(el.querySelectorAll('.multi-options input:checked')).map(function (i) { return i.value; });
  }
  function setMultiTriggerText(id) {
    const defaults = {
      'ms-biz': '全部业务', 'ms-level': '全部等级', 'ms-meet': '全部满足度', 'ms-state': '全部状态',
      'ms-product': '全部产品线', 'ms-type': '全部类型', 'ms-date': '全部日期'
    };
    const values = getMultiValues(id);
    const trigger = document.querySelector('#' + id + ' .multi-trigger');
    if (!values.length) {
      trigger.innerHTML = '<span class="multi-placeholder">' + defaults[id] + '</span>';
    } else {
      const visible = values.slice(0, 2);
      const rest = values.slice(2);
      let html = visible.map(function (v) {
        return '<span class="multi-tag">' + escapeHtml(v) +
          '<span class="remove" onclick="removeMultiValue(\'' + id + '\', \'' + v + '\'); event.stopPropagation();">×</span></span>';
      }).join('');
      if (rest.length) {
        html += '<span class="multi-more" title="' + escapeHtml(rest.join('、')) + '">+' + rest.length + '</span>';
      }
      trigger.innerHTML = html;
    }
    trigger.title = values.length ? values.join('、') : defaults[id];
  }
  function removeMultiValue(id, value) {
    const el = document.getElementById(id);
    el.querySelectorAll('.multi-options input').forEach(function (i) {
      if (i.value === value) i.checked = false;
    });
    onMultiChange(id);
  }
  function onMultiChange(id) {
    setMultiTriggerText(id);
    updateMultiOptionStyles(id);
    // 仅更新 UI，不触发筛选；筛选仅在点击【确定】时执行
  }
  document.addEventListener('click', function (e) {
    if (!e.target.closest('.multi-select')) {
      document.querySelectorAll('.multi-select').forEach(function (ms) {
        ms.classList.remove('open');
        resetMultiOptions(ms);
      });
    }
  });
  // 滚动或缩放时关闭下拉，避免 fixed 定位错位
  window.addEventListener('scroll', function () {
    document.querySelectorAll('.multi-select').forEach(function (ms) {
      ms.classList.remove('open');
      resetMultiOptions(ms);
    });
  }, { passive: true });
  window.addEventListener('resize', function () {
    document.querySelectorAll('.multi-select').forEach(function (ms) {
      ms.classList.remove('open');
      resetMultiOptions(ms);
    });
  });

  /* 目标地图 · 全局状态 */
  let tmAllScenes = [];
  let tmMatchMap = new Map();
  let tmTotal = 0;
  let tmViewMode = 'map';
  let tmRowMap = {};
  let tmTipEl = null;

  function applyTargetFilter() { renderTargetMap(); }
  function clearTargetFilter() {
    ['ms-biz', 'ms-level', 'ms-meet', 'ms-state'].forEach(function (id) {
      const el = document.getElementById(id);
      el.querySelectorAll('.multi-options input').forEach(function (i) { i.checked = false; });
      setMultiTriggerText(id);
      updateMultiOptionStyles(id);
    });
    document.getElementById('tmf-keyword').value = '';
    renderTargetMap();
  }

  /* 编码映射 */
  // 配色映射（对齐原型命名）
  function meetCls(m) { return m === '完全满足' ? 'mf' : m === '基本满足' ? 'mb' : m === '完全不满足' ? 'mn' : ''; }
  function meetColor(m) { return m === '完全满足' ? 'var(--tm-meet-full)' : m === '基本满足' ? 'var(--tm-meet-basic)' : m === '完全不满足' ? 'var(--tm-meet-none)' : 'var(--tm-meet-empty-border)'; }
  function lvCls(l) { return l === '高' ? 'lh' : l === '中' ? 'lm' : l === '低' ? 'll' : 'ln'; }
  function lvTdCls(l) { return l === '高' ? 'lv-h' : l === '中' ? 'lv-m' : l === '低' ? 'lv-l' : 'lv-n'; }
  function stDotCls(s) { return s === '开发中' ? 'd-dev' : s === '已排期' ? 'd-sched' : s === '待排期' ? 'd-wait' : s === '暂不响应' ? 'd-nores' : ''; }
  function stColor(s) { return s === '开发中' ? 'var(--tm-status-dev)' : s === '已排期' ? 'var(--tm-status-sched)' : s === '待排期' ? 'var(--tm-status-wait)' : s === '暂不响应' ? 'var(--tm-status-nores)' : 'transparent'; }

  function renderTargetMap() {
    const bizSet = getMultiValues('ms-biz');
    const levelSet = getMultiValues('ms-level');
    const meetSet = getMultiValues('ms-meet');
    const stateSet = getMultiValues('ms-state');
    const kw = document.getElementById('tmf-keyword').value.trim().toLowerCase();

    // 收集所有场景（按原始出现顺序），作为标题常驻的完整列表
    tmAllScenes = [];
    const sceneIndex = new Map();
    targetMapData.forEach(function (r) {
      const s = r.scene || '未分类';
      if (!sceneIndex.has(s)) { sceneIndex.set(s, tmAllScenes.length); tmAllScenes.push(s); }
    });

    // 执行筛选
    tmMatchMap = new Map();
    tmRowMap = {};
    tmTotal = 0;
    const matchedRows = [];
    targetMapData.forEach(function (r) {
      const bizVal = r.biz || '';
      if (bizSet.length && !bizSet.some(function (b) { return bizVal.indexOf(b) >= 0; })) return;
      if (levelSet.length && !levelSet.includes(r.level || '')) return;
      if (meetSet.length && !meetSet.includes(r.meetStatus || '')) return;
      if (stateSet.length && !stateSet.includes(r.status || '')) return;
      if (kw) {
        const hay = ((r.demand || '') + (r.currentState || '') + (r.followUp || '') + (r.biz || '')).toLowerCase();
        if (hay.indexOf(kw) < 0) return;
      }
      const s = r.scene || '未分类';
      if (!tmMatchMap.has(s)) tmMatchMap.set(s, []);
      tmMatchMap.get(s).push(r);
      tmRowMap[r.rowNo] = r;
      matchedRows.push(r);
      tmTotal++;
    });

    renderTmOverview(matchedRows);
    renderMapView();
    renderTableView();
    document.getElementById('tm-count').textContent = '共 ' + tmTotal + ' 条';
    renderSceneToc(tmAllScenes);
  }

  /* 总览仪表盘：4 列 KPI 网格（总需求 / 满足率堆叠条 / 状态分布 / 业务线覆盖率） */
  function renderTmOverview(rows) {
    const total = rows.length;
    const mf = rows.filter(r => r.meetStatus === '完全满足').length;
    const mb = rows.filter(r => r.meetStatus === '基本满足').length;
    const mn = rows.filter(r => r.meetStatus === '完全不满足').length;
    const dev = rows.filter(r => r.status === '开发中').length;
    const sch = rows.filter(r => r.status === '已排期').length;
    const wait = rows.filter(r => r.status === '待排期').length;
    const nor = rows.filter(r => r.status === '暂不响应').length;
    const pct = n => total ? Math.round(n * 100 / total) : 0;
    const sceneCount = new Set(rows.map(r => r.scene || '未分类')).size;
    const satRate = total ? Math.round((mf + mb) * 100 / total) : 0;
    const bizList = ['直播业务', '录播业务', '独立项目'];
    const bizStats = bizList.map(b => {
      const sub = rows.filter(r => (r.biz || '').indexOf(b) >= 0);
      const sf = sub.filter(r => r.meetStatus === '完全满足').length;
      const sb = sub.filter(r => r.meetStatus === '基本满足').length;
      const sn = sub.filter(r => r.meetStatus === '完全不满足').length;
      const rate = sub.length ? Math.round((sf + sb) * 100 / sub.length) : 0;
      return { name: b, total: sub.length, sf, sb, sn, rate };
    });

    let html = '<div class="tm-kpi"><div class="tm-kpi-label">总需求数</div><div class="tm-kpi-num">' + total + '</div><div class="tm-kpi-sub">分布于 ' + sceneCount + ' 个场景</div></div>';
    html += '<div class="tm-kpi"><div class="tm-kpi-label">满足率（完全 + 基本）</div><div class="tm-kpi-num" style="color:var(--tm-meet-full)">' + satRate + '<span class="pct">%</span></div>';
    html += '<div class="tm-stack"><span class="full" style="width:' + pct(mf) + '%"></span><span class="basic" style="width:' + pct(mb) + '%"></span><span class="none" style="width:' + pct(mn) + '%"></span></div>';
    html += '<div class="tm-legend"><span><i style="background:var(--tm-meet-full)"></i>完全满足 <b>' + mf + '</b></span><span><i style="background:var(--tm-meet-basic)"></i>基本满足 <b>' + mb + '</b></span><span><i style="background:var(--tm-meet-none)"></i>完全不满足 <b>' + mn + '</b></span></div></div>';
    html += '<div class="tm-kpi"><div class="tm-kpi-label">状态分布</div><div class="tm-status-grid">';
    html += '<div class="tm-status-item"><span class="dot" style="background:var(--tm-status-dev)"></span><span class="n">' + dev + '</span><span class="t">开发中</span></div>';
    html += '<div class="tm-status-item"><span class="dot" style="background:var(--tm-status-sched)"></span><span class="n">' + sch + '</span><span class="t">已排期</span></div>';
    html += '<div class="tm-status-item"><span class="dot" style="background:var(--tm-status-wait)"></span><span class="n">' + wait + '</span><span class="t">待排期</span></div>';
    html += '<div class="tm-status-item"><span class="dot" style="background:var(--tm-status-nores)"></span><span class="n">' + nor + '</span><span class="t">暂不响应</span></div>';
    html += '</div></div>';
    html += '<div class="tm-kpi"><div class="tm-kpi-label">业务线覆盖率</div>';
    bizStats.forEach(b => {
      const bw = b.total ? (b.sf * 100 / b.total) : 0;
      const bbw = b.total ? (b.sb * 100 / b.total) : 0;
      const bnw = b.total ? (b.sn * 100 / b.total) : 0;
      html += '<div class="tm-biz-row"><span class="bn">' + b.name.replace('业务', '') + '</span><span class="bar"><span style="width:' + bw + '%;background:var(--tm-meet-full)"></span><span style="width:' + bbw + '%;background:var(--tm-meet-basic)"></span><span style="width:' + bnw + '%;background:var(--tm-meet-none)"></span></span><span class="br">' + b.rate + '%</span></div>';
    });
    html += '</div>';
    document.getElementById('tm-overview').innerHTML = html;
  }

  /* 地图视图：场景 → 环节 → 色块墙 */
  function renderMapView() {
    const box = document.getElementById('tm-map-view');
    if (!tmAllScenes.length) { box.innerHTML = '<div class="tm-empty-scene" style="padding:40px;text-align:center">暂无目标地图数据</div>'; return; }
    const html = tmAllScenes.map(function (s, i) {
      const items = tmMatchMap.get(s) || [];
      const linkOrder = [], linkMap = {};
      items.forEach(function (r) {
        const l = r.link || '未分类';
        if (!linkMap[l]) { linkMap[l] = []; linkOrder.push(l); }
        linkMap[l].push(r);
      });
      const linkHtml = items.length ? linkOrder.map(function (l) {
        return '<div class="tm-link-row"><div class="tm-link-name">' + escapeHtml(l) + '</div><div class="tm-blocks">' + linkMap[l].map(function (r) {
          const mc = meetCls(r.meetStatus), lc = lvCls(r.level), dc = stDotCls(r.status);
          return '<div class="tm-block ' + mc + ' ' + lc + '" data-row="' + r.rowNo + '">'
            + '<div class="tm-block-title">' + escapeHtml(r.demand || '—') + '</div>'
            + (dc ? '<span class="tm-dot ' + dc + '"></span>' : '')
            + '</div>';
        }).join('') + '</div></div>';
      }).join('') : '<div class="tm-empty-scene">0 项</div>';
      return '<div class="tm-scene" id="tm-scene-' + i + '"><div class="tm-scene-head"><span class="name">' + escapeHtml(s) + '</span><span class="cnt">' + items.length + ' 项</span></div>' + linkHtml + '</div>';
    }).join('');
    box.innerHTML = html;
    bindTmBlockTips();
  }

  /* 表格视图：8 列 + 场景行 + 数据行展开 */
  function renderTableView() {
    const wrap = document.getElementById('tm-table-view');
    if (!tmAllScenes.length) { wrap.innerHTML = '<div class="tm-empty">暂无目标地图数据</div>'; return; }
    let bodyHtml = '';
    tmAllScenes.forEach(function (s, i) {
      const items = tmMatchMap.get(s) || [];
      const linkOrder = [], linkMap = {};
      items.forEach(function (r) {
        const l = r.link || '未分类';
        if (!linkMap[l]) { linkMap[l] = []; linkOrder.push(l); }
        linkMap[l].push(r);
      });
      bodyHtml += '<tr class="scene-row" data-scene-idx="' + i + '"><td colspan="8">' + escapeHtml(s) + '（' + items.length + ' 项）</td></tr>';
      linkOrder.forEach(function (l) {
        linkMap[l].forEach(function (r, ri) {
          const dc = stDotCls(r.status), ltc = lvTdCls(r.level);
          const showLink = ri === 0;
          bodyHtml += '<tr class="data-row" onclick="toggleTmRow(this)">';
          bodyHtml += '<td>' + (showLink ? escapeHtml(l) : '') + '</td>';
          bodyHtml += '<td>' + escapeHtml(r.func || '—') + '</td>';
          bodyHtml += '<td><span class="exp-icon"></span>' + escapeHtml(r.demand || '—') + '</td>';
          bodyHtml += '<td><span class="' + ltc + '">' + escapeHtml(r.level || '—') + '</span></td>';
          bodyHtml += '<td>' + (r.meetStatus ? '<span class="td-dot" style="background:' + meetColor(r.meetStatus) + '"></span>' + escapeHtml(r.meetStatus) : '<span class="dash">—</span>') + '</td>';
          bodyHtml += '<td>' + (r.status ? '<span class="td-dot" style="background:' + stColor(r.status) + '"></span>' + escapeHtml(r.status) : '<span class="dash">—</span>') + '</td>';
          bodyHtml += '<td>' + (r.plannedAt ? escapeHtml(r.plannedAt) : '<span class="dash">—</span>') + '</td>';
          bodyHtml += '<td style="font-size:11.5px;color:var(--tm-text-2)">' + escapeHtml(r.biz || '—') + '</td>';
          bodyHtml += '</tr>';
          bodyHtml += '<tr class="expand-row" style="display:none"><td colspan="8"><div class="exp-content"><b>现状：</b>' + (r.currentState ? escapeHtml(r.currentState) : '—') + '<br><b>后续计划：</b>' + (r.followUp ? escapeHtml(r.followUp) : '—') + '</div></td></tr>';
        });
      });
    });
    if (!tmAllScenes.length) bodyHtml = '<tr><td colspan="8" style="padding:40px;text-align:center;color:var(--tm-text-3)">无匹配的功能条目</td></tr>';
    wrap.innerHTML = '<div class="tm-table-wrap"><table class="tm-table"><thead><tr><th style="width:110px">环节</th><th style="width:130px">功能</th><th>需求</th><th style="width:54px">等级</th><th style="width:84px">满足度</th><th style="width:72px">状态</th><th style="width:92px">计划时间</th><th style="width:150px">业务线</th></tr></thead><tbody>' + bodyHtml + '</tbody></table></div>';
  }

  /* 视图切换 */
  function switchTmView(view) {
    tmViewMode = view;
    document.getElementById('tm-map-view').style.display = view === 'map' ? '' : 'none';
    document.getElementById('tm-table-view').style.display = view === 'table' ? '' : 'none';
    document.getElementById('vbtn-map').classList.toggle('active', view === 'map');
    document.getElementById('vbtn-table').classList.toggle('active', view === 'table');
  }

  /* 表格行展开（对齐原型 exp-icon 旋转） */
  function toggleTmRow(tr) {
    const next = tr.nextElementSibling;
    if (!next || !next.classList.contains('expand-row')) return;
    const icon = tr.querySelector('.exp-icon');
    if (next.style.display === 'none') {
      next.style.display = '';
      if (icon) icon.classList.add('open');
    } else {
      next.style.display = 'none';
      if (icon) icon.classList.remove('open');
    }
  }

  /* hover 气泡（对齐原型 tm-tip-* 类名） */
  function ensureTmTip() {
    if (!tmTipEl) {
      tmTipEl = document.createElement('div');
      tmTipEl.className = 'tm-tip';
      tmTipEl.style.display = 'none';
      document.body.appendChild(tmTipEl);
    }
    return tmTipEl;
  }
  function tmTipHtml(r) {
    const dc = stDotCls(r.status);
    let html = '<div class="tm-tip-title">' + escapeHtml(r.demand || '—') + '</div>';
    html += '<div class="tm-tip-row"><b>环节</b>' + escapeHtml(r.link || '—') + '</div>';
    html += '<div class="tm-tip-row"><b>功能</b>' + escapeHtml(r.func || '—') + '</div>';
    html += '<div class="tm-tip-row"><b>等级</b>' + escapeHtml(r.level || '—') + '　<b>满足度</b><span class="tm-tip-dot" style="background:' + meetColor(r.meetStatus) + '"></span>' + escapeHtml(r.meetStatus || '—') + (dc ? '　<b>状态</b><span class="tm-tip-dot" style="background:' + stColor(r.status) + '"></span>' + escapeHtml(r.status) : '') + '</div>';
    html += '<div class="tm-tip-row"><b>业务线</b>' + escapeHtml(r.biz || '—') + '　<b>计划时间</b>' + escapeHtml(r.plannedAt || '—') + '</div>';
    html += '<div class="tm-tip-sep"><div class="tm-tip-row"><b>现状</b>' + (r.currentState ? escapeHtml(r.currentState) : '<span style="color:var(--tm-text-3)">—</span>') + '</div>';
    html += '<div class="tm-tip-row"><b>后续计划</b>' + (r.followUp ? escapeHtml(r.followUp) : '<span style="color:var(--tm-text-3)">—</span>') + '</div></div>';
    return html;
  }
  function bindTmBlockTips() {
    document.querySelectorAll('#tm-map-view .tm-block').forEach(function (b) {
      b.addEventListener('mouseenter', function () {
        const r = tmRowMap[b.dataset.row]; if (!r) return;
        const tip = ensureTmTip();
        tip.innerHTML = tmTipHtml(r);
        tip.style.display = 'block';
        const rect = b.getBoundingClientRect();
        let left = rect.left;
        if (left + 340 + 20 > window.innerWidth) left = window.innerWidth - 356;
        let top = rect.bottom + 8;
        if (top + tip.offsetHeight + 12 > window.innerHeight) top = rect.top - tip.offsetHeight - 8;
        tip.style.top = Math.max(8, top) + 'px';
        tip.style.left = Math.max(8, left) + 'px';
      });
      b.addEventListener('mouseleave', function () { ensureTmTip().style.display = 'none'; });
    });
  }

  function renderSceneToc(groups) {
    const box = document.getElementById('toc-targetmap');
    box.innerHTML = '<div class="toc-title">场景目录</div>'
      + groups.map(function (s, i) { return '<div class="toc-item" onclick="scrollToScene(' + i + ')">' + escapeHtml(s) + '</div>'; }).join('');
  }
  function scrollToScene(i) {
    if (tmViewMode === 'table') {
      const scroll = document.querySelector('#tm-table-view .tm-table-wrap');
      const row = scroll ? scroll.querySelector('[data-scene-idx="' + i + '"]') : null;
      if (row) scroll.scrollTop = row.offsetTop;
      return;
    }
    const el = document.getElementById('tm-scene-' + i);
    if (!el) return;
    const header = document.querySelector('.header');
    const offset = (header ? header.offsetHeight : 0) + 20;
    const top = el.getBoundingClientRect().top + window.scrollY - offset;
    window.scrollTo({ top: top, behavior: 'smooth' });
  }
</script>

</body>
</html>
